<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
  </head>
  <body>
    <style>
      html,body{
        zoom: 150%;
        background-color: #ddd;
          margin: 0;
  padding: 0;
      }
canvas {
  display: block;
}
h1{
  text-align: center;
}
#p2{
  position: absolute;
  left: 525px;
  top: 75px;
  text-align: right;
}
#p1 input{
  width: 30px;
}
#challenger{
  width: 75px;
}
#hp, #ascent, #surges, #penalty1{
  width: 30px;
}
#general{
  position: absolute;
  top: 75px;
  left: 250px;
  display: flex;
  gap: 10px;
}

#general input{
  margin-top: 20px;
 width: 30px;
  height: 20px;
}

    </style>
     <h1>Round Tracker</h1>
    <div id="p1">
      <input type="text" value="Ben"><span id="fp1"></span><br>
      <span>Health:</span>
      <input id="hp1" type="number" value="25"><br>
      <span>Ascent:</span>
      <input type="number" value="0"><br>
      <span>Surges:</span>
      <input type="number" value="0"><br>
      <span>Presence Modifier:</span>
      <input type="number" value="0"><br>
    </div>
    <div id="general">
       <h2>Round</h2>
      <input id="rInput" type="number" value="1" min="1">
      <h2 id="cBoard">(L)</h2>
    </div>
    <div id="p2">
      <input id="challenger" type="text" value=""><span id="fp2"></span><br>
      <span>Health:</span>
      <input id="hp2" type="number" value="25"><br>
      <span>Ascent:</span>
      <input id="ascent" type="number" value="0"><br>
      <span>Surges:</span>
      <input id="surges" type="number" value="0"><br>
      <span>Presence Modifier:</span>
      <input id="penalty1" type="number" value="0"><br>
    </div>
    <script>
      const fp1 = document.getElementById("fp1")
      const fp2 = document.getElementById("fp2")
      const hp1 = document.getElementById("hp1")
      const hp2 = document.getElementById("hp2")
      const rInput = document.getElementById("rInput")
const cBoard = document.getElementById("cBoard")
rInput.addEventListener("change",updateCutoff,false)
let cutoff = null
function updateCutoff(){
  if(hp1.value > hp2.value){
    fp1.innerHTML = "(First Player)"
  }
  else if(hp1.value < hp2.value){
    fp2.innerHTML = "(First Player)"
  }
  else if(Math.random() < 0.5){
    fp1.innerHTML = "(First Player)"
  }
  else{
    fp2.innerHTML = "(First Player)"
  }
  const round = parseInt(rInput.value)
  let cutoffBase = null
  switch(round % 3){
    case 1:
    if(round === 1){
      cutoff = "L"
    }
    else{
      cutoff = ((Math.floor(round/3))+1)+"L"
    }
    break
    case 2:
    if(round === 2){
    cutoff = "W - 2"
    }
    else{
      cutoff = ((Math.floor(round / 3))+1)+"W - 2"
    }
    break
    default:
    if(round === 3){
    cutoff = "2D"
    }
    else{
      cutoff = ((round/3)+1)+"D"
    }
    break
  }
  cBoard.innerHTML = "("+cutoff+")"
}
updateCutoff()
    </script>
  </body>
</html>
